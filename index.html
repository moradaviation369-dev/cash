<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كاش بب | تفعيل المكافأة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #1A54EF;
            --secondary-color: #FFD700;
            --bg-gradient: linear-gradient(135deg, #1A54EF 0%, #002DAB 100%);
            --text-dark: #2d3436;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }

        body {
            font-family: 'Tajawal', sans-serif;
            background: #f8faff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* خلفية مزخرفة بفقاعات ضوئية */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--bg-gradient);
            clip-path: circle(70% at 50% -20%);
            z-index: -1;
        }

        .container {
            width: 90%;
            max-width: 450px;
            perspective: 1000px;
        }

        .card {
            background: white;
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            position: relative;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .gift-wrapper {
            width: 100px;
            height: 100px;
            background: #f0f4ff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            position: relative;
        }

        .gift-wrapper i {
            font-size: 45px;
            color: var(--primary-color);
            animation: bounce 2s infinite;
        }

        h2 { color: var(--text-dark); font-weight: 900; margin: 10px 0; font-size: 24px; }
        p { color: #636e72; line-height: 1.6; margin-bottom: 25px; }

        .code-container {
            background: #f9f9fb;
            border: 2px dashed #d1d8e0;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 30px;
            position: relative;
            cursor: pointer;
            overflow: hidden;
        }

        .code-container:hover { border-color: var(--primary-color); background: #f0f4ff; }

        .code-label {
            display: block;
            font-size: 12px;
            color: #b2bec3;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .code-value {
            font-size: 32px;
            font-weight: 900;
            color: var(--primary-color);
            letter-spacing: 4px;
            display: block;
        }

        .btn-main {
            background: var(--primary-color);
            color: white;
            padding: 18px 30px;
            border: none;
            border-radius: 18px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 10px 20px rgba(26, 84, 239, 0.3);
            text-decoration: none;
        }

        .btn-main:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(26, 84, 239, 0.4);
            background: #0043ce;
        }

        .btn-main:active { transform: translateY(-1px); }

        .steps-box {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #f1f2f6;
            display: flex;
            justify-content: space-around;
        }

        .step-item { font-size: 12px; color: #636e72; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .step-item i { color: #2ecc71; font-size: 16px; }

        /* الأنميشن */
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }

        /* إشعار النسخ */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #2d3436;
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 14px;
            z-index: 9999;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="gift-wrapper">
            <i class="fas fa-gift"></i>
        </div>
        
        <h2>هديتك جاهزة! 🎁</h2>
        <p>انسخ الكود أسفله واستخدمه عند التسجيل لتفعيل مكافأة الـ 5000 نقطة فوراً.</p>

        <div class="code-container" onclick="copyCode()" id="codeCard">
            <span class="code-label">كود الإحالة الخاص بك</span>
            <span class="code-value" id="valToCopy">51503001</span>
        </div>

        <button class="btn-main" onclick="copyAndRedirect()">
            <i class="fas fa-copy"></i>
            نسخ وتوجه للتسجيل
        </button>

        <div class="steps-box">
            <div class="step-item">
                <i class="fas fa-check-circle"></i>
                <span>1. انسخ الكود</span>
            </div>
            <div class="step-item">
                <i class="fas fa-check-circle"></i>
                <span>2. املأ بياناتك</span>
            </div>
            <div class="step-item">
                <i class="fas fa-check-circle"></i>
                <span>3. ألصق الكود</span>
            </div>
        </div>
    </div>
</div>

<div id="toast" class="toast">تم نسخ الكود بنجاح! ✅</div>

<script>
    const myCode = "51503001";

    function showToast() {
        const toast = document.getElementById("toast");
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2000);
    }

    function copyCode() {
        navigator.clipboard.writeText(myCode);
        showToast();
        // تأثير بصري للبطاقة عند الضغط
        document.getElementById("codeCard").style.transform = "scale(0.95)";
        setTimeout(() => {
            document.getElementById("codeCard").style.transform = "scale(1)";
        }, 100);
    }

    function copyAndRedirect() {
        navigator.clipboard.writeText(myCode);
        showToast();
        
        // تحويل بعد ثانية ليعرف المستخدم أنه تم النسخ
        setTimeout(() => {
            window.location.href = "https://www.cashpub.ma/subscribeMembreLightInitAction.do";
        }, 1200);
    }
</script>

</body>
</html>
