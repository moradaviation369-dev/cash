<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفعيل هديتك في Cashpub</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; }
        .code-box { background: #eef2ff; border: 2px dashed #1A54EF; padding: 15px; font-size: 24px; font-weight: bold; color: #1A54EF; margin: 20px 0; border-radius: 10px; cursor: pointer; }
        .btn { background: #1A54EF; color: white; padding: 15px 30px; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; width: 100%; text-decoration: none; display: inline-block; }
        .hint { font-size: 14px; color: #666; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🎁 هديتك جاهزة!</h2>
    <p>اضغط على الكود لنسخه ثم اضغط على الزر للتسجيل:</p>
    
    <div class="code-box" id="referralCode" onclick="copyCode()">51503001</div>
    
    <a href="https://www.cashpub.ma/subscribeMembreLightInitAction.do" class="btn" onclick="copyCode()">نسخ الكود وفتح الموقع</a>
    
    <p class="hint">⚠️ تأكد من لصق الكود في خانة "Referral Code" للحصول على النقاط.</p>
</div>

<script>
    function copyCode() {
        const code = "51503001";
        navigator.clipboard.writeText(code).then(() => {
            alert("تم نسخ الكود بنجاح: " + code + "\nقم بلصقه في خانة Referral Code");
        });
    }
</script>

</body>
</html>
